apiVersion: apps/v1
kind: Deployment
metadata:
  name: food-app-deployment

spec:
  replicas: 2
  selector:
    matchLabels:
      app: food-app

  template:
    metadata:
      labels:
        app: food-app

    spec:
      containers:
      - name: food-app
        image: lakshayar107/food-order-app
        ports:
        - containerPort: 8080

---
apiVersion: v1
kind: Service
metadata:
  name: food-app-service

spec:
  type: NodePort
  selector:
    app: food-app
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30010